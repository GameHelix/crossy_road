<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#0d0d1a"/>

  <!-- Road -->
  <rect x="0" y="36" width="64" height="16" fill="#181824"/>
  <!-- Road dashes -->
  <rect x="4"  y="43" width="10" height="3" rx="1.5" fill="#ffdd00" opacity="0.9"/>
  <rect x="22" y="43" width="10" height="3" rx="1.5" fill="#ffdd00" opacity="0.9"/>
  <rect x="40" y="43" width="10" height="3" rx="1.5" fill="#ffdd00" opacity="0.9"/>

  <!-- Water -->
  <rect x="0" y="52" width="64" height="12" rx="0" fill="#061428"/>
  <ellipse cx="16" cy="56" rx="10" ry="3" fill="#0044cc" opacity="0.6"/>
  <ellipse cx="46" cy="59" rx="12" ry="3" fill="#0044cc" opacity="0.6"/>

  <!-- Grass -->
  <rect x="0" y="28" width="64" height="8" fill="#0e1f0e"/>

  <!-- Chicken body -->
  <rect x="24" y="10" width="16" height="18" rx="5" fill="#f0f0f0"/>
  <!-- Head -->
  <circle cx="32" cy="8" r="8" fill="#f5f5f5"/>
  <!-- Comb -->
  <ellipse cx="29" cy="1.5" rx="2" ry="3" fill="#ff3344"/>
  <ellipse cx="32" cy="0.5" rx="2" ry="3.5" fill="#ff3344"/>
  <ellipse cx="35" cy="1.5" rx="2" ry="3" fill="#ff3344"/>
  <!-- Eyes -->
  <circle cx="28.5" cy="7" r="2" fill="#111122"/>
  <circle cx="35.5" cy="7" r="2" fill="#111122"/>
  <circle cx="29"   cy="6.5" r="0.7" fill="white"/>
  <circle cx="36"   cy="6.5" r="0.7" fill="white"/>
  <!-- Beak -->
  <path d="M30 11 L34 11 L32 14Z" fill="#ff9900"/>
  <!-- Wings -->
  <ellipse cx="21" cy="18" rx="4" ry="7" transform="rotate(-15 21 18)" fill="#e0e0e0"/>
  <ellipse cx="43" cy="18" rx="4" ry="7" transform="rotate(15 43 18)"  fill="#e0e0e0"/>
  <!-- Feet -->
  <rect x="26" y="27" width="5" height="3" rx="1.5" fill="#ff6600"/>
  <rect x="33" y="27" width="5" height="3" rx="1.5" fill="#ff6600"/>

  <!-- Neon glow ring (decorative) -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="#00ffaa" stroke-width="1.5" opacity="0.25"/>
</svg>
